<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>2017 DSM corrected against 2025_B base</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
      background: #111;
      color: #eee;
    }
    #map {
      width: 100%;
      height: 100%;
    }
    .info-panel {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 1000;
      background: rgba(20, 20, 20, 0.85);
      color: #fff;
      padding: 12px 14px;
      border-radius: 8px;
      max-width: 340px;
      line-height: 1.4;
      font-size: 14px;
    }
    .info-panel h3 {
      margin: 0 0 8px 0;
      font-size: 16px;
    }
    .info-panel code {
      color: #9fd3ff;
    }
  </style>
</head>
<body>
  <div class="info-panel">
    <h3>2017 DSM corrected against 2025_B base</h3>
    <div><strong>Base epoch:</strong> 2025_B</div>
    <div><strong>Target epoch:</strong> 2017</div>
    <div><strong>Factor giro:</strong> -0.1</div>
    <div><strong>CRS:</strong> EPSG:32719</div>
    <div><strong>Raster:</strong> <code>2017_DSM_nk_corrected.tif</code></div>
  </div>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const bounds = [
      [-16.057523151752374, -68.30224516752108],
      [-16.049613008714015, -68.29381247333585]
    ];

    const map = L.map("map", {
      zoomControl: true
    });

    L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "&copy; OpenStreetMap contributors"
    }).addTo(map);

    const imageOverlay = L.imageOverlay("../assets/coreg_2017_nk_corrected.png", bounds, {
      opacity: 0.85
    }).addTo(map);

    map.fitBounds(bounds);

    L.control.scale().addTo(map);
  </script>
</body>
</html>
